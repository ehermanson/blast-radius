version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # The "version" of this action is the rustc toolchain it installs;
      # the MSRV job must stay pinned to the declared rust-version.
      - dependency-name: dtolnay/rust-toolchain
