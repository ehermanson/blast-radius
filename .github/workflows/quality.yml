name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Jobs are grouped by what they protect:
#   build/hygiene  — lint, msrv
#   test/*         — does blast-radius compute the right BLAST RADIUS? (cargo test)
#   accuracy-oracle — does it resolve the right IMPORT GRAPH? (vs dependency-cruiser)
# See docs/ci.md for what a failure in each job means.
jobs:
  # ── build / hygiene ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Check it builds on the minimum supported Rust version
        run: cargo check --all-features

  # ── test/* — validate the reported blast radius (the cargo test suite) ────
  # Core JS/TS suite + coverage floor + a real-repo stress run.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Fetch example snapshots
        run: ./scripts/fetch-examples.sh
      - name: Run tests
        run: cargo test
      - name: Enforce coverage floor
        run: cargo llvm-cov --summary-only --fail-under-lines 85 --fail-under-regions 83 --fail-under-functions 84
      - name: Stress test Chakra UI example
        run: cargo run --bin blast-radius -- --repo-root examples/chakra-ui file packages/react/src/components/button/button.tsx > /dev/null

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch example snapshots
        run: ./scripts/fetch-examples.sh
      - name: Run Python feature tests
        run: cargo test --features python
      - name: Stress test Python demo
        run: cargo run --features python --bin blast-radius -- --repo-root examples/python-demo file app/utils/formatting.py > /dev/null
      - name: Stress test FastAPI example
        run: cargo run --features python --bin blast-radius -- --repo-root examples/fastapi file fastapi/applications.py > /dev/null

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Rust feature tests
        run: cargo test --features rust
      - name: Stress test Rust demo
        run: cargo run --features rust --bin blast-radius -- --repo-root examples/rust-demo file src/utils/formatting.rs > /dev/null

  test-vue-svelte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Vue/Svelte feature tests
        run: cargo test --features vue,svelte
      - name: Stress test component demo
        run: cargo run --features vue,svelte --bin blast-radius -- --repo-root examples/component-demo file src/shared.ts > /dev/null

  # Everything compiled in together — catches feature-interaction regressions.
  test-all-languages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch example snapshots
        run: ./scripts/fetch-examples.sh
      - name: Run all-language tests
        run: cargo test --features python,rust,vue,svelte

  # Release binaries ship for Windows; exercise real backslash path handling.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  # Renderer for the GitHub Action's PR comment (pure JSON -> Markdown).
  pr-comment-renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Test PR-comment renderer
        run: node --test scripts/pr-comment.test.mjs

  # ── accuracy oracle — validate the import graph (resolution) ─────────────
  # blast-radius's import edges must not MISS any edge a mature independent
  # resolver (dependency-cruiser) finds. `--strict` fails on reference-only
  # edges; blast-radius finding *more* edges is fine. See scripts/accuracy/.
  accuracy-oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Build blast-radius
        run: cargo build
      - name: Fetch example snapshots
        run: ./scripts/fetch-examples.sh
      # Fast committed fixtures first (no network fetch needed).
      - name: Oracle — committed fixtures
        run: |
          node scripts/accuracy/oracle.mjs tests/fixtures/monorepo --strict
          node scripts/accuracy/oracle.mjs examples/vite-react-ts --strict
      # Large real-world snapshots: a component library and a real application.
      - name: Oracle — Chakra UI (library)
        run: node scripts/accuracy/oracle.mjs examples/chakra-ui --strict
      - name: Oracle — Excalidraw (application)
        run: node scripts/accuracy/oracle.mjs examples/excalidraw --strict
