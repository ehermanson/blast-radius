name: quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests
        run: cargo test

      - name: Enforce coverage floor
        run: cargo llvm-cov --summary-only --fail-under-lines 85 --fail-under-regions 83 --fail-under-functions 84

      - name: Stress test Chakra UI example
        run: cargo run --bin blast-radius -- --repo-root examples/chakra-ui file packages/react/src/components/button/button.tsx > /dev/null

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run Python feature tests
        run: cargo test --features python

      - name: Stress test Python demo
        run: cargo run --features python --bin blast-radius -- --repo-root examples/python-demo file app/utils/formatting.py > /dev/null

      - name: Stress test FastAPI example
        run: cargo run --features python --bin blast-radius -- --repo-root examples/fastapi file fastapi/applications.py > /dev/null
